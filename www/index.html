<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Osaka Daily Check</title>
<style>
body { font-family: -apple-system, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; background: #f5f5f5; overflow-y: scroll; }
h1 { font-size: 1.4rem; }
h2 { font-size: 1.1rem; margin-top: 24px; }
.time { color: #666; font-size: .9rem; }
.summary { margin: 16px 0; padding: 12px; background: #fff; border-radius: 6px; }
.num { font-weight: 600; color: #1890ff; }
.loading { color: #999; font-style: italic; }
table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 6px; overflow: hidden; margin: 8px 0 20px; }
th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #eee; font-size: .9rem; }
th { background: #fafafa; font-weight: 600; }
.ok td:last-child { color: #389e0d; }
.err td:last-child { color: #cf1322; }
.clickable { cursor: pointer; }
.clickable:hover { background: #e6f7ff !important; }
#topBtn { position: fixed; bottom: 30px; right: 30px; z-index: 99; display: none; padding: 10px 16px; font-size: .8rem; background: #1890ff; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
#topBtn:hover { background: #40a9ff; }
.raw-item { background: #1e1e1e; color: #d4d4d4; padding: 12px 16px; margin: 4px 0; border-radius: 4px; font-size: .8rem; overflow-x: auto; }
.raw-item.highlight { background: #2b5b84; transition: background 0.1s; }
details { margin-top: 20px; }
summary { cursor: pointer; font-size: .95rem; padding: 8px 0; }
h3 { font-size: .95rem; margin: 16px 0 8px; }
.empty { color: #999; padding: 16px; text-align: center; }
.drag-hint { position: fixed; inset: 0; z-index: 9999; display: none; justify-content: center; align-items: center; background: rgba(24,144,255,0.12); border: 4px dashed #1890ff; border-radius: 12px; margin: 12px; pointer-events: none; backdrop-filter: blur(2px); }
.drag-hint span { background: #fff; padding: 24px 48px; border-radius: 12px; font-size: 1.2rem; color: #1890ff; font-weight: 600; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
</style>
</head>
<body>
<h1>Osaka Daily Check</h1>
<p class="time" id="time">-</p>
<div class="summary" id="summary">⏳ Loading...</div>

<h2>Host</h2>
<table id="host-table"><tbody></tbody></table>

<h2>Problem</h2>
<div id="problem-section"></div>

<details id="raw-section">
<summary><strong>Raw Data</strong></summary>
<div id="raw-data-section"></div>
</details>

<button onclick="topFunction()" id="topBtn" title="Back to top">Back to Top</button>
<div class="drag-hint" id="dragHint"><span>Drop 01.json</span></div>

<script>
const SEVERITY_COLOR = {"0": "#8c8c8c", "1": "#52c41a", "2": "#faad14", "3": "#fa8c16", "4": "#f5222d", "5": "#722ed1"};
const dragHint = document.getElementById('dragHint');

function highlight(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const details = document.getElementById('raw-section');
  if (!details.open) details.open = true;
  el.classList.add('highlight');
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  setTimeout(() => el.classList.remove('highlight'), 1500);
}

let topBtn = document.getElementById('topBtn');
window.onscroll = function() {
  topBtn.style.display = document.documentElement.scrollTop > 300 ? 'block' : 'none';
};
function topFunction() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function $(id) { const el = document.getElementById(id); if (!el) throw new Error('Element #' + id + ' not found in DOM'); return el; }

function render(data) {
  const hosts = data.hosts || [];
  const problems = data.problems || [];
  const rawHosts = data.raw_hosts || [];
  const rawProblems = data.raw_problems || [];
  const okCount = hosts.filter(h => h.status === 'Ok').length;
  const time = data.time || '-';

  $('time').textContent = time;
  $('summary').innerHTML = '✅ Ok: <span class="num">' + okCount + '/' + hosts.length + '</span> · ❌ Problems: <span class="num">' + problems.length + '</span>';

  let hostRows = '<thead><tr><th>Host</th><th>Status</th></tr></thead><tbody>';
  hosts.forEach((h, i) => {
    const cls = h.status === 'Ok' ? 'ok' : 'err';
    const icon = h.status === 'Ok' ? '✅' : '❌';
    hostRows += '<tr class="clickable ' + cls + '" onclick="highlight(\'raw-host-' + i + '\')"><td>' + h.name + '</td><td>' + icon + ' ' + h.status + '</td></tr>';
  });
  hostRows += '</tbody>';
  $('host-table').innerHTML = hostRows;

  if (problems.length > 0) {
    let probHtml = '<table><thead><tr><th>Host</th><th>Problem</th><th>Severity</th><th>Time</th></tr></thead><tbody>';
    problems.forEach((p, i) => {
      const color = SEVERITY_COLOR[p.severity] || '#8c8c8c';
      probHtml += '<tr class="clickable" onclick="highlight(\'raw-prob-' + i + '\')"><td>' + p.host + '</td><td>' + p.name + '</td><td style="color:' + color + '">' + p.severity_name + '</td><td>' + p.clock + '</td></tr>';
    });
    probHtml += '</tbody></table>';
    $('problem-section').innerHTML = probHtml;
  } else {
    $('problem-section').innerHTML = '<p class="empty">No active problems</p>';
  }

  let rawHtml = '<h3>Host</h3>';
  rawHosts.forEach((h, i) => {
    rawHtml += '<pre id="raw-host-' + i + '" class="raw-item">' + JSON.stringify(h, null, 2) + '</pre>';
  });
  const unackRawProblems = rawProblems.filter(p => p.acknowledged !== '1');
  rawHtml += '<h3>Problem</h3>';
  unackRawProblems.forEach((p, i) => {
    rawHtml += '<pre id="raw-prob-' + i + '" class="raw-item">' + JSON.stringify(p, null, 2) + '</pre>';
  });
  $('raw-data-section').innerHTML = rawHtml;
}

function loadFromFile(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    let data;
    try {
      data = JSON.parse(e.target.result);
    } catch (err) {
      alert('Invalid JSON: ' + err.message);
      return;
    }
    if (!data.hosts && !data.problems) {
      alert('Invalid JSON format: missing "hosts" or "problems" field');
      return;
    }
    try {
      render(data);
    } catch (err) {
      alert('Render error: ' + err.message);
    }
  };
  reader.readAsText(file);
}

document.addEventListener('dragenter', function(e) {
  e.preventDefault();
  dragHint.style.display = 'flex';
});
document.addEventListener('dragover', function(e) {
  e.preventDefault();
});
document.addEventListener('dragleave', function(e) {
  e.preventDefault();
  if (!e.relatedTarget || e.relatedTarget.nodeName === 'HTML') {
    dragHint.style.display = 'none';
  }
});
document.addEventListener('drop', function(e) {
  e.preventDefault();
  dragHint.style.display = 'none';
  const file = e.dataTransfer.files[0];
  if (!file || !file.name.endsWith('.json')) {
    alert('Please drop a .json file');
    return;
  }
  loadFromFile(file);
});

fetch('01.json')
  .then(r => {
    if (!r.ok) throw new Error('Not found');
    return r.json();
  })
  .then(d => render(d))
  .catch(() => {
    try {
      $('summary').innerHTML = '⚠️ 01.json not available — drag a JSON file to load';
      $('time').textContent = '-';
    } catch(e) {
      document.body.innerHTML = '<p style="color:red">DOM elements missing</p>';
    }
  });
</script>
</body>
</html>
